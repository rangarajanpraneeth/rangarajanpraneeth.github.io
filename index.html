<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Qubit</title>

   <style>
      /* html {
         mix-blend-mode: difference;
      } */

      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         box-sizing: border-box;
         font-weight: 500;
         line-height: 1;
         padding: 0;
         margin: 0;

         scroll-behavior: smooth;
         text-decoration: none;
         list-style: none;

         text-align: center;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         color: white;
      }

      .header {



         position: fixed;
         top: 0;
         left: 0;
         width: 100vw;
         background-color: rgba(0, 0, 0, .5);
         backdrop-filter: blur(1rem);
      }

      .header__wrapper {
         width: 75%;
         margin: 0 auto;
         padding: 1rem;
         display: flex;
         justify-content: space-between;
         align-items: center;
      }

      .header__left {
         display: flex;
         align-items: center;
         gap: 8rem;
      }

      .header__logo {
         font-size: 2rem;
      }

      .header__container {
         display: flex;
         align-items: center;
         gap: 2rem;
      }

      .header__right {
         display: flex;
         align-items: center;
      }

      .header__link {
         padding: .5rem;
         transition: .25s;
      }

      .header__link:hover {
         text-decoration: underline;
      }

      .header__button {
         background-color: white;
         color: black;
         padding: .5rem 1rem;
         border-radius: 1rem;
         transition: .25s;
      }

      .header__button:hover {
         box-shadow: 0 -5rem 5rem 2rem rgba(255, 255, 255, 0.5);
      }

      .landing__page {



         display: flex;
         flex-direction: column;
         justify-content: space-between;
         align-items: center;
         height: 100vh;
         width: 100vw;
         padding: 6rem 2rem;
      }

      .landing__title {
         margin-top: 5rem;
         width: 100%;
         display: flex;
         flex-direction: column;
         align-items: center;


         gap: 2rem;
      }

      .main {
         font-size: 4rem;
      }

      .sub {
         font-size: 2rem;
      }

      .landing__button {
         padding: 1rem;
         outline: 2px solid white;
         border-radius: 2rem;

         transition: .25s;
      }

      .landing__button:hover {
         transform: translateY(-.5rem);
      }

      .content__page {
         background-color: red;
         height: 1000vh;
         width: 100vw;
      }
   </style>
</head>

<body>
   <script defer></script>

   <div class="header">
      <div class="header__wrapper">
         <div class="header__left">
            <a href="" class="header__logo">Qubit</a>
            <div class="header__container">
               <a href="#" class="header__link">About</a>
               <a href="#" class="header__link">Projects</a>
               <a href="#" class="header__link">Testimonials</a>
            </div>
         </div>
         <div class="header__right">
            <a href="" class="header__button">Contact us</a>
         </div>
      </div>
   </div>

   <div class="landing__page">
      <div class="landing__title">
         <span class="main">Title / Mission Statement / PLACEHOLDER</span>
         <span class="sub">subtitle / miscellaneous text</span>
      </div>
      <a href="#content" class="landing__button">Check us out</a>
   </div>

   <div class="content__page" id="content"></div>
</body>

</html>
