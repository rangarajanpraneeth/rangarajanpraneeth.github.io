<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="UTF-8">

   <title>Qubit</title>

   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,500,0,0" />

   <style>
      /* SWITCH BETWEEN DARK AND LIGHT MODE */
      /* html {
         mix-blend-mode: difference;

      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         scroll-behavior: smooth;
         box-sizing: border-box;
         /* text-align: center; */
         font-weight: 500;
         line-height: 1;
         padding: 0;
         margin: 0;

         user-select: none;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      .header {
         text-align: center;
         z-index: 999;
         background-color: rgba(0, 0, 0, .6);
         backdrop-filter: blur(1rem);
         /* background-color: black; */
         position: fixed;
         width: 100vw;
         left: 0;
         top: 0;
      }

      .header__wrapper {
         padding: 1rem;
         width: 80%;
         margin: 0 auto;
         display: flex;
         justify-content: space-between;
         align-items: center;
      }

      .header__left {
         display: flex;
         gap: 8rem;
         align-items: center;
      }

      .header__logo {
         font-size: 2rem;
      }

      .header__container {
         display: flex;
         align-items: center;
         gap: 2rem;
      }

      .header__right {
         display: flex;
         align-items: center;
      }

      .header__link {
         padding: .5rem;
         transition: .25s;
      }

      .header__link:hover {
         text-decoration: underline;
      }

      .header__button {
         padding: .5rem 1rem;
         background-color: white;
         border-radius: 1rem;
         transition: .25s;
         color: black;
      }

      .header__button:hover {
         box-shadow: 0 -5rem 5rem 2rem rgba(255, 255, 255, 0.5);
      }

      /* .header__menu {
         display: none;
      } */

      /* .icon {
         display: flex;
         align-items: center;
         font-size: 2rem;
      } */

      /* .header__list {

         left: 0;
         flex-direction: column;
         gap: 2rem;
         font-size: 2rem;
         padding: 2rem;
         width: 100vw;
         height: calc(100vh - 4rem);

         transition: .25s;
      } */

      /* .hidden {
         transform: translateX(calc(-100%));
      } */

      /* @media screen and (max-width: 1079px) {
         .header__wrapper {
            width: 100%;
         }

         .header__container,

            display: none;
         }

         .header__menu {
            display: block;
         }
      }

      @media screen and (min-width: 1080px) {
         .header__list {
            display: none;
         }
      } */

      .error__screen {
         position: fixed;
         top: 0;
         left: 0;

         width: 100vw;
         height: 100vh;
         background-color: black;
         color: #f66;
         padding: 1rem;

         z-index: 9999;
         display: none;

         font-size: 2rem;
         /* line-height: 5rem; */
      }

      @media screen and (max-width: 1079px) {
         .error__screen {
            display: block;
         }
      }

      .content__page {
         width: 85%;
         margin: 0 auto;
         min-height: fit-content;
         padding: 8rem 0 4rem;


         /* text-align: left; */
      }

      /* .text__container {
         display: flex;
         flex-direction: column;
      } */

      /* .text__container {
         margin-left: 2rem;
      } */

      .pics__container {
         margin-top: 4rem;
         /* padding: 4rem; */

         /* display: grid;
         grid-template-columns: 1fr 1fr 1fr;
         column-gap: 1rem;
         row-gap: 1rem; */
      }

      .picture {
         width: 100%;
         /* height: ; */
         aspect-ratio: 16/9;
         /* aspect-ratio: 5/4; */
         background-color: #222;

         border-radius: 1rem;
      }

      .title,
      .shuffle {
         font-size: 5rem;
      }
