<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Qubit</title>

   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,500,0,0" />

   <style>
      /* SWITCH BETWEEN DARK AND LIGHT MODE */
      /* html {
         mix-blend-mode: difference;
      } */

      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         scroll-behavior: smooth;
         box-sizing: border-box;
         text-align: center;
         font-weight: 500;
         line-height: 1;
         padding: 0;
         margin: 0;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      .header {
         z-index: 999;
         /* background-color: rgba(0, 0, 0, .5); */
         /* backdrop-filter: blur(1rem); */
         background-color: black;
         position: fixed;
         width: 100vw;
         left: 0;
         top: 0;
      }

      .header__wrapper {
         padding: 1rem;
         width: 75%;
         margin: 0 auto;
         display: flex;
         justify-content: space-between;
         align-items: center;
      }

      .header__left {
         display: flex;
         gap: 8rem;
         align-items: center;
      }

      .header__logo {
         font-size: 2rem;
      }

      .header__container {
         display: flex;
         align-items: center;
         gap: 2rem;
      }

      .header__right {
         display: flex;
         align-items: center;
      }

      .header__link {
         padding: .5rem;
         transition: .25s;
      }

      .header__link:hover {
         text-decoration: underline;
      }

      .header__button {
         padding: .5rem 1rem;
         background-color: white;
         border-radius: 1rem;
         transition: .25s;
         color: black;
      }

      .header__button:hover {
         box-shadow: 0 -5rem 5rem 2rem rgba(255, 255, 255, 0.5);
      }

      .header__menu {
         display: none;
      }

      .icon {
         /* height: 2rem;
         width: 2rem; */
         display: flex;
         align-items: center;
         font-size: 2rem;
      }

      .header__list {
         z-index: 998;
         background-color: black;
         display: flex;
         position: fixed;
         top: 4rem;
         left: 0;
         flex-direction: column;
         gap: 2rem;
         font-size: 2rem;
         padding: 2rem;
         /* height: 100vh; */
         width: 100vw;

         transition: .25s;
      }

      .hidden {
         transform: translateY(calc(-100%));
         /* transform: translateY(calc(-100% - 4rem)); */
      }

      @media screen and (max-width: 1079px) {
         .header__wrapper {
            width: 100%;
         }

         .header__container,
         .header__right {
            display: none;
         }

         .header__menu {
            display: block;
         }
      }
   </style>
</head>

<body>
   <script defer>
      function toggleMenu() {
         document.querySelector('.header__list').classList.toggle('hidden');
      }
   </script>

   <div class="header__list hidden">
      <a href="#" class="">About</a>
      <a href="#" class="">Projects</a>
      <a href="#" class="">Testimonials</a>
      <a href="" class="">Contact us</a>
   </div>

   <div class="header">
      <div class="header__wrapper">
         <div class="header__left">
            <a href="" class="header__logo">Qubit</a>
            <div class="header__container">
               <a href="#" class="header__link">About</a>
               <a href="#" class="header__link">Projects</a>
               <a href="#" class="header__link">Testimonials</a>
            </div>
         </div>
         <div class="header__right">
            <a href="" class="header__button">Contact us</a>
         </div>
         <div class="header__menu">
            <span class="material-symbols-rounded icon" onclick="toggleMenu()">menu</span>
         </div>
      </div>
   </div>

   <div class="landing__page" id="landing">
   </div>

   <div class="content__page" id="content">
   </div>
</body>

</html>
