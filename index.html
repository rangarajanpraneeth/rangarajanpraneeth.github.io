<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Qubit</title>

   <style>
      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         box-sizing: border-box;
         line-height: 1;
         padding: 0;
         margin: 0;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      .header__wrapper {
         width: 75%;
         margin: 0 auto;
         display: flex;
         justify-content: space-between;
         align-items: center;
         padding: 1.25rem;
      }

      .header__left {
         display: flex;
         align-items: center;
         gap: 8rem;
      }

      .header__logo {
         font-weight: 500;
         font-size: 2rem;
      }

      .header__container {
         display: flex;
         align-items: center;
         gap: 1rem;
      }

      .header__right {
         display: flex;
         align-items: center;

         font-size: 1rem;
      }

      .header__link {
         font-weight: 500;
         transition: .25s;
      }

      .header__link:hover {
         box-shadow: 0 -5rem 10rem 2rem rgba(255, 255, 255, 0.75);
      }

      .header__button {
         font-weight: 500;
         padding: 1rem;
         background-color: white;
         border-radius: .5rem;

         transition: .25s;
         color: black;
      }

      .header__button:hover {
         box-shadow: 0 -5rem 10rem 2rem rgba(255, 255, 255, 0.5);
      }
   </style>
</head>

<body>
   <script defer></script>

   <div class="header__wrapper">
      <div class="header__left">
         <a href="" class="header__logo">Qubit</a>
         <div class="header__container">
            <a href="" class="header__link">ABOUT</a>
            <a href="" class="header__link">PROJECTS</a>
         </div>
      </div>
      <div class="header__right">
         <a href="" class="header__button">CONTACT</a>
      </div>
   </div>
</body>

</html>
