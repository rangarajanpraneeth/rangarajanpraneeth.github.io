<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>

   <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap');

      * {
         font-family: "Playfair Display", serif;
         -webkit-font-smoothing: antialiased;
         box-sizing: border-box;
         user-select: none;
         line-height: 1;
         padding: 0;
         margin: 0;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      .logo {
         font-size: 3rem;
         position: fixed;
         top: 1rem;
         left: 2rem;
         z-index: 999;
      }

      .menu {
         font-size: 3rem;
         position: fixed;
         top: 1rem;
         right: 2rem;
         z-index: 999;
      }

      .title {
         position: absolute;
         top: 40%;
         left: 50%;
         transform: translate(-50%, -50%);
         font-size: 4rem;
         text-align: center;
         z-index: 999;
      }

      .button {
         position: absolute;
         top: 60%;
         left: 50%;
         transform: translate(-50%, -50%);
         padding: 1rem 2rem;
         font-size: 2rem;
         border: 1px solid rgba(255, 255, 255, .25);
         background-color: rgba(255, 255, 255, .15);
         backdrop-filter: blur(1rem);
         border-radius: 2rem;
         transition: .25s;
         z-index: 999;
      }

      .button:hover {
         box-shadow: 0 0 4rem 2rem rgba(255, 255, 255, .15);
      }

      .gallery {
         height: 100vh;
         width: 100vw;
      }

      .item {
         position: absolute;
         width: 32rem;
         aspect-ratio: 2/1;
      }

      img {
         height: 100%;
         width: 100%;
         object-fit: cover;
         opacity: .25;
         transition: .25s;
      }

      img:hover {
         opacity: .5;
         box-shadow: 0 0 4rem 2rem rgba(255, 255, 255, .25);
         backdrop-filter: hue-rotate(90deg);
      }

      .content__page {
         height: 100vh;
         width: 100vw;
      }
   </style>
</head>

<body>
   <span class="logo">Qubit</span>
   <span class="menu">Menu</span>

   <span class="title">Transforming your ideas<br>into unique websites.</span>
   <a href="" class="button">CONTACT US</a>

   <div class="gallery"></div>

   <div class="content__page">
   </div>

   <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
   <script defer>
      const items = [
         { img: 'https://i.pinimg.com/474x/de/73/af/de73aff550fbb1673bd2e09503b0a6bd.jpg', speed: .05 },
         { img: 'https://images.pexels.com/photos/414659/pexels-photo-414659.jpeg?cs=srgb&dl=pexels-pixabay-414659.jpg&fm=jpg', speed: .075 },
         { img: 'https://i.pinimg.com/1200x/c3/1d/ac/c31dacf64ac2bcadec06203934cbee8b.jpg', speed: .05 },
         { img: 'https://images.pexels.com/photos/52500/horse-herd-fog-nature-52500.jpeg?cs=srgb&dl=pexels-pixabay-52500.jpg&fm=jpg', speed: .075 },
         { img: 'https://images.unsplash.com/photo-1521489871110-81dc5a61dbda?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D', speed: .1 },
         { img: 'https://onlinejpgtools.com/images/examples-onlinejpgtools/snowy-mountain-gray-srgb.jpg', speed: .075 },
         { img: 'https://blogdowallpaper.files.wordpress.com/2008/07/gray-nyc.jpg', speed: .05 },
         { img: 'https://pikwizard.com/pw/small/4bfac36677c4186f18e35a3b424dcf84.jpg', speed: .075 },
         { img: 'https://pikwizard.com/pw/small/7cdbfbe71c5fdb3031612bae5acf1b7c.jpg', speed: .05 }
      ]

      const gallery = document.querySelector('.gallery');

      const itemPositions = [
         { top: '0%', left: '0%' },
         { top: '0%', left: 'calc(50% - 16rem)' },
         { top: '0%', left: 'calc(100% - 32rem)' },
         { top: 'calc(50% - 8rem)', left: '0%' },
         { top: 'calc(50% - 8rem)', left: 'calc(50% - 16rem)' },
         { top: 'calc(50% - 8rem)', left: 'calc(100% - 32rem)' },
         { top: 'calc(100% - 16rem)', left: '0%' },
         { top: 'calc(100% - 16rem)', left: 'calc(50% - 16rem)' },
         { top: 'calc(100% - 16rem)', left: 'calc(100% - 32rem)' },
      ]

      items.forEach((itemData, index) => {
         const item = document.createElement('div');
         item.classList.add('item');

         const position = itemPositions[index];
         item.style.top = position.top;
         item.style.left = position.left;

         const img = document.createElement('img');
         img.src = itemData.img;
         item.appendChild(img);

         gallery.appendChild(item);
      });

      document.addEventListener('mousemove', (e) => {
         gallery.querySelectorAll('.item').forEach((item, index) => {
            const animationFactor = items[index].speed;
            const deltaX = (e.clientX - window.innerWidth / 2) * animationFactor;
            const deltaY = (e.clientY - window.innerHeight / 2) * animationFactor;

            gsap.to(item, { x: deltaX, y: deltaY, duration: .75 });
         });
      });
   </script>
</body>

</html>
