<!DOCTYPE html>

<html lang="en">

<head>

   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,500,0,0" />

   <style>
      /* SWITCH BETWEEN DARK AND LIGHT MODE */
      /* html {
         mix-blend-mode: difference;
      } */

      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         scroll-behavior: smooth;
         box-sizing: border-box;

      *::-webkit-scrollbar {

      }

      body {
         background-color: black;

      }

      a {

      }

      .header {
         text-align: center;

         /* background-color: rgba(0, 0, 0, .5); */
         /* backdrop-filter: blur(1rem); */

         position: fixed;
         width: 100vw;
         left: 0;
         top: 0;
      }

      .header__wrapper {
         padding: 1rem;
         width: 80%;
         margin: 0 auto;
         display: flex;
         justify-content: space-between;
         align-items: center;
      }

      .header__left {

      }

      .header__logo {

      .header__container {

      }

      .header__link {

      }

      .header__link:hover {
         text-decoration: underline;
      }

      .header__button {
         padding: .5rem 1rem;
         background-color: white;
         border-radius: 1rem;
         transition: .25s;
         color: black;
      }

      .header__button:hover {
         box-shadow: 0 -5rem 5rem 2rem rgba(255, 255, 255, 0.5);
      }

      .header__menu {
         display: none;
      }

      .icon {
         /* height: 2rem;
         width: 2rem; */
         display: flex;
         align-items: center;
         font-size: 2rem;
      }

      .header__list {
         z-index: 998;
         background-color: black;
         display: flex;
         position: fixed;
         top: 4rem;
         left: 0;
         flex-direction: column;
         gap: 2rem;
         font-size: 2rem;
         padding: 2rem;
         /* height: 100vh; */
         width: 100vw;

         transition: .25s;
      }

      .hidden {
         transform: translateY(calc(-100%));
         /* transform: translateY(calc(-100% - 4rem)); */
      }

      @media screen and (max-width: 1079px) {
         .header__wrapper {
            width: 100%;
         }

         .header__container,
         .header__right {
            display: none;
         }

         .header__menu {
            display: block;
         }
      }

      @media screen and (min-width: 1080px) {
         .header__list {
            display: none;
         }
      }

      .content__page {
         width: 70%;
         margin: 0 auto;
         min-height: 100vh;
         padding: 8rem 0 4rem;

         /* text-align: left; */
      }

      .title,
      .shuffle {
         font-size: 5rem;
      }

      .dud {
         /* color: #a6c; */
         color: #ff0;
      }

<body>

   <div class="header">

               <a href="#" class="header__link">About</a>

               <a href="#" class="header__link">Testimonials</a>

   </div>

   <!-- <div class="landing__page" id="landing">
   </div> -->

   <div class="content__page" id="content">
      <h1 class="title">Do your business with our </h1>
      <!-- <span class="shuffle__text"></span> -->
      <!-- <br> -->
      <h1 class="shuffle"></h1>
      <!-- TODO FIX SHUFFLE FUNCTION -->
   </div>





   <script>
      function toggleMenu() {
         document.querySelector('.header__list').classList.toggle('hidden');
      }





      class TextScramble {
         constructor(el) {
            this.el = el
            this.chars = '0123456789'
            // this.chars = '!<>-_\\/[]{}—=+*^?#________'
            this.update = this.update.bind(this)
         }
         setText(newText) {
            const oldText = this.el.innerText
            const length = Math.max(oldText.length, newText.length)
            const promise = new Promise((resolve) => this.resolve = resolve)
            this.queue = []
            for (let i = 0; i < length; i++) {
               const from = oldText[i] || ''
               const to = newText[i] || ''
               const start = Math.floor(Math.random() * 50)
               const end = start + Math.floor(Math.random() * 50)
               this.queue.push({ from, to, start, end })
            }
            cancelAnimationFrame(this.frameRequest)
            this.frame = 0
            this.update()
            return promise
         }
         update() {
            let output = ''
            let complete = 0
            for (let i = 0, n = this.queue.length; i < n; i++) {
               let { from, to, start, end, char } = this.queue[i]
               if (this.frame >= end) {
                  complete++
                  output += to
               } else if (this.frame >= start) {
                  // if (!char || Math.random < 0.28) {
                  if (!char) {
                     char = this.randomChar()
                     this.queue[i].char = char
                  }
                  output += `<span class="dud">${char}</span>`
               } else {
                  output += from
               }
            }
            this.el.innerHTML = output
            if (complete === this.queue.length) {
               this.resolve()
            } else {
               this.frameRequest = requestAnimationFrame(this.update)
               this.frame++
            }
         }
         randomChar() {
            return this.chars[Math.floor(Math.random() * this.chars.length)]
         }
      }

      const phrases = [
         'hello',
         'world',
         'bussiness'
      ]

      const el = document.querySelector('.shuffle')
      const fx = new TextScramble(el)

      let counter = 0
      const next = () => {
         fx.setText(phrases[counter]).then(() => {
            setTimeout(next, 2000)
         })
         counter = (counter + 1) % phrases.length
      }

      next()
   </script>
</body>

</html>
