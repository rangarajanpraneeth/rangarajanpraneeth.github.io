<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>

   <style>
      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         box-sizing: border-box;
         user-select: none;
         font-weight: 500;
         font-size: 1rem;
         line-height: 1;
         padding: 0;
         margin: 0;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      img {
         height: 100%;
         width: 100%;
         object-fit: cover;
      }

      header {
         z-index: 999;
         position: fixed;
         top: 1rem;
         left: 50%;
         transform: translateX(-50%);
         display: flex;
         gap: 4rem;
      }
      /* .container {
         height: 100vh;
         width: 100vw;
         overflow: hidden;
         scroll-behavior: smooth;
      } */

      .link {
         color: rgba(255, 255, 255, .5);
         /* font-size: 1.25rem; */
         transition: .15s;
      }

      .link:hover {
         color: white;
      }

      .slider {
         height: 100vh;
         width: 100vw;
         position: relative;
         overflow: hidden;
      }

      .image {
         height: 100%;
         width: 100%;
         position: absolute;
      }

      .slider__counter {
         height: 1rem;
         display: flex;
         gap: .5rem;
         position: absolute;
         bottom: 2rem;
         left: 50%;
         transform: translateX(-50%);
         clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
      }

      .slider__counter>div {
         flex: 1;
      }

      .counter {
         position: relative;
         top: 0;
         will-change: transform;
      }

      .slider__title {
         height: 3rem;
         width: 100%;
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
         /* overflow: none; */
      }

      .slider__title__wrapper {
         width: 100%;
         text-align: center;
         position: relative;
         top: 0;
         will-change: transform;
      }

      .slider__title__wrapper p {
         font-size: 3rem;
         /* line-height: 3rem; */
      }

      .slider__indicators {
         width: 75%;
         display: flex;
         justify-content: space-between;
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
      }

      .slider__indicators p {
         font-size: 3rem;
         font-weight: 100;
         position: relative;
         will-change: transform;
      }

      .slider__preview {
         height: 4rem;
         /* width: 35%; */
         display: flex;
         gap: 1rem;
         position: absolute;
         bottom: 2rem;
         right: 2rem;
      }

      .preview {
         position: relative;
         flex: 1;
         cursor: pointer;
      }

      .preview::after {
         content: '';
         background-color: rgba(0, 0, 0, .25);
         height: 100%;
         width: 100%;
         position: absolute;
         top: 0;
         left: 0;
         transition: .3s ease-in-out;
      }

      .preview.active::after {
         background-color: rgba(0, 0, 0, 0);
         /* position: absolute; */
         /* margin: .5rem; */
         outline: 1px solid white;
      }




      /* .about {
         width: 100vw;
         position: relative;
      } */

      @media screen and (max-width: 90rem) {
         .slider__indicators {
            width: 90%;
         }

         .slider__preview {
            right: 1rem;
            width: calc(100% - 2rem);
            bottom: 5rem;
         }
      }
   </style>
</head>

<body>
   <header>
      <a href="#slider" class="link">Work</a>
      <a href="#about" class="link">Contact</a>
   </header>

   <!-- <div class="container"> -->
      <div id="slider" class="slider">
         <div class="slider__images">
            <div class="image"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
         </div>

         <div class="slider__title">
            <div class="slider__title__wrapper">
               <p>First Placeholder Title</p>
               <p>Second Placeholder Title</p>
               <p>Third Placeholder Title</p>
               <p>Fourth Placeholder Title</p>
               <p>Fifth Placeholder Title</p>
            </div>
         </div>

         <div class="slider__counter">
            <div class="counter">
               <p>1</p>
               <p>2</p>
               <p>3</p>
               <p>4</p>
               <p>5</p>
            </div>
            <div>
               <p>&mdash;</p>
            </div>
            <div>
               <p>5</p>
            </div>
         </div>

         <div class="slider__preview">
            <div class="preview active"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
            <div class="preview"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
            <div class="preview"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
            <div class="preview"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
            <div class="preview"><img
                  src="https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg"
                  alt=""></div>
         </div>

         <div class="slider__indicators">
            <p>+</p>
            <p>+</p>
         </div>
      </div>

      <!-- <div id="about" class="about">
      </div> -->
   <!-- </div> -->

   <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>

   <script>
      document.addEventListener('DOMContentLoaded', () => {
         gsap.registerPlugin(CustomEase);
         CustomEase.create('hop', 'M0,0 C0.071,0.505 0.192,0.726 0.318,0.852 0.450,0.984 0.504,1 1,1');

         const sliderImages = document.querySelector('.slider__images');
         const counter = document.querySelector('.counter');
         const titles = document.querySelector('.slider__title__wrapper');
         const indicators = document.querySelectorAll('.slider__indicators p');
         const previewSlides = document.querySelectorAll('.slider__preview .preview');
         const sliderPreview = document.querySelector('.slider__preview');

         let currentImage = 1;
         const totalSlides = 5;
         let indicatorRotation = 0;

         const updateCounterAndTitlePosition = () => {
            const counterY = -16 * (currentImage - 1);
            const titleY = -48 * (currentImage - 1);

            gsap.to(counter, {
               y: counterY,
               duration: 1,
               ease: 'hop'
            });

            gsap.to(titles, {
               y: titleY,
               duration: 1,
               ease: 'hop'
            });
         }

         const updateActiveSlidePreview = () => {

            console.log('UPDAYE')
            previewSlides.forEach(preview => {
               preview.classList.remove('active');
            });
            previewSlides[currentImage - 1].classList.add('active');
         }

         const animateSlide = direction => {
            const currentSlide = document.querySelectorAll('.image')[document.querySelectorAll('.image').length - 1];

            const slideImage = document.createElement('div');
            slideImage.classList.add('image');

            const slideImageElement = document.createElement('img');
            slideImageElement.src = 'https://www.solidbackgrounds.com/images/1920x1080/1920x1080-slate-gray-solid-color-background.jpg';
            // slideImageElement.src = `./images/image${currentImage}.jpg`;
            gsap.set(slideImageElement, { x: direction === 'left' ? -300 : 300 });

            slideImage.appendChild(slideImageElement);
            sliderImages.appendChild(slideImage);

            gsap.to(currentSlide.querySelector('img'), {
               x: direction === 'left' ? 300 : -300,
               duration: 1.5,
               ease: 'power4.out'
            });

            gsap.fromTo(slideImage, {
               clipPath: direction === 'left' ? 'polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%)' : 'polygon(100% 0%, 100% 0%, 100% 100%, 100% 100%)'
            }, {
               clipPath: 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)',
               duration: 1.5,
               ease: 'power4.out'
            });

            gsap.to(slideImageElement, {
               x: 0,
               duration: 1.5,
               ease: 'power4.out'
            });

            cleanupSlides();

            indicatorRotation += direction === 'left' ? -90 : 90;

            gsap.to(indicators, {
               rotate: indicatorRotation,
               duration: 1,
               ease: 'hop'
            });
         }

         document.addEventListener('click', (event) => {
            const sliderWidth = document.querySelector('.slider').clientWidth;
            const clickPosition = event.clientX;

            if (sliderPreview.contains(event.target)) {
               const clickedPreview = event.target.closest('.preview');

               if (clickedPreview) {
                  const clickedIndex = Array.from(previewSlides).indexOf(clickedPreview) + 1;

                  if (clickedIndex !== currentImage) {
                     if (clickedIndex < currentImage) {
                        currentImage = clickedIndex;
                        animateSlide('left');
                     } else {
                        currentImage = clickedIndex;
                        animateSlide('right');
                     }
                     updateActiveSlidePreview();
                     updateCounterAndTitlePosition();
                  }
               }
               return;
            }

            if (clickPosition < sliderWidth / 2 && currentImage !== 1) {
               currentImage--;
               animateSlide('left');
            } else if (clickPosition > sliderWidth / 2 && currentImage !== totalSlides) {
               currentImage++;
               animateSlide('right');
            }

            updateActiveSlidePreview();
            updateCounterAndTitlePosition();
         });

         const cleanupSlides = () => {
            const imageElements = document.querySelectorAll('.slider__images .image');
            if (imageElements.length > totalSlides) {
               imageElements[0].remove();
            }

         }
      });
   </script>
</body>

</html>
