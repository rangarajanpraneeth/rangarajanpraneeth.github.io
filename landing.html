   <style>
      * {
         font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         box-sizing: border-box;
         user-select: none;
         font-weight: 500;
         font-size: 1rem;
         line-height: 1;
         padding: 0;
         margin: 0;
      }

      *::-webkit-scrollbar {
         display: none;
      }

      body {
         background-color: black;
         color: white;
      }

      a {
         text-decoration: none;
         color: white;
      }

      img {
         height: 100%;
         width: 100%;
         object-fit: cover;
      }

      .container {
         position: fixed;
         width: 100%;
         height: 100%;
         display: flex;
         gap: 1rem;
      }

      .container .col {
         position: relative;
         flex: 1;
         width: 100%;
         display: flex;
         flex-direction: column;
         gap: 1rem;
      }

      .col .item {
         position: relative;
         flex: 1;
         width: 100%;
         background-color: gray;
         overflow: hidden;
      }

      .col1,
      .col3,
      .col5 {
         top: 100%;
      }

      .col1 .item,
      .col3 .item,
      .col5 .item {
         top: 100%;
      }

      .col2 .item,
      .col4 .item {
         top: -100%;
      }
   </style>
</head>

   <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

   <script>
      let tl = gsap.timeline({ delay: 0 });

      tl.to('.col', {
         top: 0,
         duration: 3,
         ease: 'power4.inOut'
      });

      tl.to('.col1 .item', {
         top: 0,
         stagger: .25,
         duration: 3,
         ease: 'power4.inOut'
      }, '-=2');

      tl.to('.col2 .item', {
         top: 0,
         stagger: -.25,
         duration: 3,
         ease: 'power4.inOut'
      }, '-=4');

      tl.to('.col3 .item', {
         top: 0,
         stagger: .25,
         duration: 3,
         ease: 'power4.inOut'
      }, '-=4');

      tl.to('.col4 .item', {

         stagger: -.25,
         duration: 3,
         ease: 'power4.inOut'
      }, '-=4');

      tl.to('.col5 .item', {
         top: 0,
         stagger: .25,
         duration: 3,
         ease: 'power4.inOut'
      }, '-=4');

      tl.to('.container', {
         scale: 6,
         duration: 4,
         ease: 'power4.inOut'
      }, '-=2');
