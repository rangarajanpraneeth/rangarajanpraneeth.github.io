      /* LENIS BOILERPLATE START */

      /* html.lenis,
      html.lenis body {

      } */

      .lenis.lenis-smooth {

      }

      .lenis.lenis-smooth [data-lenis-prevent] {

      }

      .lenis.lenis-stopped {
         overflow: hidden;
      }

      .lenis.lenis-smooth iframe {
         pointer-events: none;
      }

      /* LENIS BOILERPLATE END */

         color: white;
      }

         color: white;
      }

      section {

         width: 100vw;
      }

      .landing {
         padding: 3rem;
         height: 100vh;
         width: 100vw;

      /* .title__section {
         display: flex;

      .contact__button {

         border: 1px solid white;
         position: absolute;
         bottom: 3rem;
         right: 3rem;
      }

      .content {
         height: 100vh;
         width: 100vw;
      }
